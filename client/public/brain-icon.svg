<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circle background -->
  <circle cx="32" cy="32" r="30" fill="#0a0e1a" stroke="url(#brainGrad)" stroke-width="2"/>
  
  <!-- Brain shape -->
  <g filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M20 32c0-8 4-14 10-14 3 0 5 2 5 4 0 2-1 3-2 4 2 1 3 3 3 5 0 4-3 7-6 7-2 0-4-1-5-3-1 2-3 4-5 4-3 0-6-3-6-7 0-2 1-4 3-5-2-1-3-3-3-5 0-3 3-5 6-5" 
      fill="url(#brainGrad)" fill-opacity="0.8"/>
    
    <!-- Right hemisphere -->
    <path d="M44 32c0-8-4-14-10-14-3 0-5 2-5 4 0 2 1 3 2 4-2 1-3 3-3 5 0 4 3 7 6 7 2 0 4-1 5-3 1 2 3 4 5 4 3 0 6-3 6-7 0-2-1-4-3-5 2-1 3-3 3-5 0-3-3-5-6-5" 
      fill="url(#brainGrad)" fill-opacity="0.8"/>
    
    <!-- Central divide -->
    <line x1="32" y1="18" x2="32" y2="46" stroke="#0a0e1a" stroke-width="2"/>
    
    <!-- Neural dots -->
    <circle cx="24" cy="28" r="2" fill="#fff" fill-opacity="0.8"/>
    <circle cx="40" cy="28" r="2" fill="#fff" fill-opacity="0.8"/>
    <circle cx="28" cy="36" r="1.5" fill="#fff" fill-opacity="0.6"/>
    <circle cx="36" cy="36" r="1.5" fill="#fff" fill-opacity="0.6"/>
    <circle cx="26" cy="42" r="1" fill="#fff" fill-opacity="0.4"/>
    <circle cx="38" cy="42" r="1" fill="#fff" fill-opacity="0.4"/>
  </g>
</svg>
